name: CI

on:
  push:
    branches: [main, release]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated mocks are up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code -- '*.mocks.dart' || (echo '::error::Generated mocks are stale. Run build_runner and commit the result.' && exit 1)

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  rules-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install rules test dependencies
        run: npm --prefix rules_test ci

      - name: Run security rules tests on emulators
        run: firebase emulators:exec --only firestore,storage --project demo-glaze-manager "npm --prefix rules_test test"
